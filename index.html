<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ders Defteri — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Modernize Edilmiş Renk Paleti */
    --bg: #0f172a;           /* Derin gece mavisi / Arduvaz */
    --bg-alt: #1e293b;       /* Kartlar için bir ton açık arka plan */
    --accent: #818cf8;       /* Yumuşak İndigo (Ana vurgu) */
    --secondary: #38bdf8;    /* Açık Mavi (Oklar ve ufak detaylar için) */
    --muted: #64748b;        /* Pasif öğeler için gri/mavi */
    --soft: #f8fafc;         /* Tam beyaz yerine göz yormayan kırık beyaz */
    --soft-dim: #cbd5e1;     /* Alt metinler için yumuşak gri */
  }
  
  *{box-sizing:border-box;}
  html{ background: var(--bg); }
  body{
    margin:0; background: var(--bg);
    /* Daha modern, mistik ve derinlik katan yeni arka plan gradient'leri */
    background-image:
      radial-gradient(circle at 15% 0%, #1e1b4b 0%, transparent 50%),
      radial-gradient(circle at 85% 100%, #0c4a6e 0%, transparent 50%);
    background-attachment:fixed;
    color:var(--soft); font-family:'Space Grotesk', sans-serif; min-height:100vh;
    display:flex; justify-content:center; padding:32px 16px 48px;
  }
  .wrap{ width:100%; max-width:480px; }
  header{ text-align:center; margin-bottom:28px; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:30px; margin:0 0 6px; color:var(--accent); }
  .sub{ font-size:13.5px; color:var(--soft-dim); line-height:1.5; }

  .grid{ display:flex; flex-direction:column; gap:12px; }
  .card{
    display:flex; align-items:center; gap:16px; text-decoration:none;
    background:var(--bg-alt); 
    border:1px solid rgba(129, 140, 248, 0.15); /* Çerçeveye saydam bir indigo dokunuşu */
    border-left:4px solid var(--accent); border-radius:14px; padding:18px 18px;
    transition:transform .15s ease, border-color .2s ease, background .2s ease, box-shadow .2s ease;
  }
  /* Kartların üzerine gelindiğinde modern bir parlama ve yükselme efekti */
  .card:hover:not(.soon) {
    background: #27364f;
    border-color: rgba(129, 140, 248, 0.4);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .card:active:not(.soon){ transform:scale(.985); background: #1e293b; }
  
  .card .ico{ font-size:30px; line-height:1; flex:0 0 auto; }
  .card .body{ flex:1; min-width:0; }
  .card .title{ font-family:'Fraunces', serif; font-weight:600; font-size:19px; color:var(--soft); margin-bottom:2px; }
  .card .desc{ font-size:12.5px; color:var(--soft-dim); line-height:1.4; }
  
  .card .arrow{ color:var(--secondary); font-size:20px; flex:0 0 auto; transition: transform 0.2s ease; }
  /* Ok işaretinin üzerine gelince hafif sağa kayması (Mikro etkileşim) */
  .card:hover:not(.soon) .arrow { transform: translateX(4px); }

  .card.soon{ border-left-color:var(--muted); opacity:.6; pointer-events:none; }
  .card.soon .arrow{ font-size:11px; font-family:'IBM Plex Mono', monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

  footer{ text-align:center; margin-top:28px; font-size:11.5px; color:var(--muted); font-family:'IBM Plex Mono', monospace; }
  
  ::selection{ background:var(--accent); color:#fff; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Ders Defteri</div>
    <h1>Çalışma Merkezi</h1>
    <div class="sub">Çalışmak istediğin dersi seç</div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>Hepsi tek repoda · çevrimdışı çalışır</footer>

</div>

<script>
  const cards = [
    { ico:"💗", title:"YÖKDİL Kelime", desc:"255 kelime & edat · kartlar, test, liste", file:"yokdil-kelime.html" },
    { ico:"⚛️", title:"Fizik", desc:"Konu anlatımı ve çalışma kartları", file:"fizik.html" },
    { ico:"📐", title:"Matematik", desc:"Yeni Formüller", soon:true },
  ];

  const grid = document.getElementById('grid');
  cards.forEach(c=>{
    const el = document.createElement(c.soon ? 'div' : 'a');
    el.className = 'card' + (c.soon ? ' soon' : '');
    if(!c.soon) el.href = c.file;
    el.innerHTML =
      `<div class="ico">${c.ico}</div>
       <div class="body">
         <div class="title">${c.title}</div>
         <div class="desc">${c.desc}</div>
       </div>
       <div class="arrow">${c.soon ? 'Yakında' : '→'}</div>`;
    grid.appendChild(el);
  });
</script>
</body>
</html>
