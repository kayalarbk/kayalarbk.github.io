<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YÖKDİL Fen — Kelime Defteri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2a0f1c; --bg-alt:#3a1528; --paper:#fff5f8; --paper-line:#f3d3e0; --ink:#3a1226;
    --accent:#ff5d8f; --rose:#ff8fb3; --plum:#c44d7a; --coral:#ff6b6b; --mint:#5ad1a8;
    --muted:#c98aa6; --soft:#fbe4ee; --soft-dim:#cf9fb6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 18% 0%, #4a1a30 0%, transparent 55%),
      radial-gradient(circle at 90% 95%, #45152b 0%, transparent 50%), var(--bg);
    color:var(--soft); font-family:'Space Grotesk', sans-serif; min-height:100vh;
    display:flex; justify-content:center; padding:18px 14px 40px;
  }
  .app{ width:100%; max-width:480px; }
  header{ text-align:center; margin-bottom:16px; }
  .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin:0 0 4px; color:var(--accent); }
  .sub{ font-size:13px; color:var(--soft-dim); }

  .stats{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:4px 10px; font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--soft-dim); margin:14px 2px 8px; }
  .stats b{ color:var(--accent); font-weight:600; }
  .progress-track{ height:3px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; margin-bottom:16px; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--rose), var(--accent)); width:0%; transition:width .3s; }

  .tabs{ display:flex; gap:6px; background:var(--bg-alt); padding:4px; border-radius:10px; margin-bottom:14px; }
  .tab{ flex:1; text-align:center; padding:9px 4px; font-size:13px; font-weight:600; border-radius:7px; cursor:pointer; color:var(--soft-dim); user-select:none; transition:.15s; }
  .tab.active{ background:var(--accent); color:#3a0a1d; }

  .chips{ display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; margin-bottom:8px; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; font-family:'IBM Plex Mono', monospace; font-size:11px; padding:6px 11px; border-radius:999px; border:1px solid rgba(255,143,179,.4); color:var(--muted); cursor:pointer; white-space:nowrap; transition:.15s; }
  .chip.active{ background:var(--rose); color:#3a0a1d; border-color:var(--rose); }
  .chip.hard{ border-color:rgba(255,107,107,.5); color:var(--coral); }
  .chip.hard.active{ background:var(--coral); color:#3a0a1d; border-color:var(--coral); }

  .hidden{ display:none !important; }

  .card-wrap{ perspective:1200px; height:320px; cursor:pointer; margin-bottom:12px; position:relative; }
  .card{ width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,.2,.2,1); }
  .card.flipped{ transform:rotateY(180deg); }
  .face{ position:absolute; inset:0; backface-visibility:hidden; border-radius:16px; padding:24px 22px; display:flex; flex-direction:column; background:var(--paper); color:var(--ink); box-shadow:0 14px 34px rgba(180,40,90,.35); border:1px dashed var(--paper-line); }
  .face-back{ transform:rotateY(180deg); background:#43182e; color:var(--soft); border:1px dashed rgba(255,93,143,.35); }
  .tag-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:auto; }
  .cat-tag{ font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--plum); border:1px solid rgba(196,77,122,.5); padding:3px 8px; border-radius:999px; }
  .face-back .cat-tag{ color:var(--rose); border-color:rgba(255,143,179,.45); }
  .box-dot{ display:flex; gap:4px; }
  .box-dot span{ width:6px; height:6px; border-radius:50%; background:rgba(196,77,122,.25); }
  .box-dot span.on{ background:var(--accent); }
  .word-en{ font-family:'Fraunces', serif; font-weight:600; font-size:23px; line-height:1.3; margin:auto 0 6px; }
  .syn{ font-size:13px; color:#a96384; font-style:italic; line-height:1.4; }
  .ex{ font-size:12.5px; color:#8a5570; line-height:1.45; margin-top:8px; }
  .ex b{ color:var(--plum); font-weight:600; }
  .word-tr{ font-family:'Fraunces', serif; font-weight:500; font-size:24px; line-height:1.3; margin:auto 0 6px; color:var(--accent); }
  .face-back .syn{ color:var(--soft-dim); }
  .face-back .ex{ color:var(--soft-dim); }
  .face-back .ex b{ color:var(--rose); }
  .hint{ font-size:11px; color:#bd8aa1; margin-top:auto; }
  .face-back .hint{ color:var(--soft-dim); }

  /* love card */
  .card.is-love .face{ background:linear-gradient(150deg,#ff7eb3,#ff5d8f 60%,#c44d7a); color:#fff; border:1px solid rgba(255,255,255,.4); }
  .card.is-love .face-back{ background:linear-gradient(150deg,#c44d7a,#ff5d8f); }
  .love-label{ font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.85); }
  .love-msg{ font-family:'Fraunces', serif; font-style:italic; font-size:21px; line-height:1.4; margin:auto 0; text-align:center; }
  .love-heart{ font-size:30px; text-align:center; }

  .grade-row{ display:flex; gap:10px; margin-bottom:10px; }
  .grade-btn{ flex:1; padding:13px 8px; border-radius:10px; border:none; font-family:'Space Grotesk'; font-weight:600; font-size:13px; cursor:pointer; }
  .grade-again{ background:rgba(255,107,107,.16); color:var(--coral); border:1px solid rgba(255,107,107,.4); }
  .grade-good{ background:rgba(90,209,168,.16); color:var(--mint); border:1px solid rgba(90,209,168,.4); }

  .nav-row{ display:flex; gap:8px; }
  .nav-btn{ flex:1; padding:11px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:transparent; color:var(--soft-dim); font-family:'Space Grotesk'; font-weight:600; font-size:13px; cursor:pointer; }
  .nav-btn:active{ background:rgba(255,255,255,.06); }

  .toggle-row{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; font-size:12px; color:var(--soft-dim); }
  .toggle-row input{ accent-color:var(--accent); width:15px; height:15px; }

  .quiz-card{ background:var(--bg-alt); border-radius:16px; padding:20px 18px; border:1px solid rgba(255,143,179,.12); }
  .quiz-q{ font-family:'Fraunces', serif; font-size:17px; line-height:1.45; color:var(--soft); margin-bottom:16px; }
  .quiz-q b{ color:var(--accent); }
  .quiz-q .blank{ color:var(--rose); font-weight:600; }
  .opt{ display:block; width:100%; text-align:left; background:rgba(255,255,255,.05); border:1px solid rgba(255,143,179,.16); color:var(--soft); padding:12px 14px; border-radius:9px; margin-bottom:8px; font-family:'Space Grotesk'; font-size:13.5px; line-height:1.35; cursor:pointer; }
  .opt.correct{ background:rgba(90,209,168,.2); border-color:var(--mint); color:var(--mint); }
  .opt.wrong{ background:rgba(255,107,107,.2); border-color:var(--coral); color:var(--coral); }
  .scoreboard{ display:flex; justify-content:space-between; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--soft-dim); margin-top:14px; padding-top:12px; border-top:1px dashed rgba(255,143,179,.2); }
  .scoreboard b.ok{ color:var(--mint); } .scoreboard b.bad{ color:var(--coral); }
  .qmode-row{ display:flex; gap:6px; margin-bottom:12px; }
  .qmode-btn{ flex:1; padding:8px 4px; border-radius:8px; font-size:11.5px; font-weight:600; cursor:pointer; border:1px solid rgba(255,143,179,.3); background:transparent; color:var(--soft-dim); font-family:'Space Grotesk'; }
  .qmode-btn.active{ background:var(--plum); color:#fff; border-color:var(--plum); }

  .search-box{ width:100%; padding:11px 13px; border-radius:10px; border:1px solid rgba(255,143,179,.2); background:var(--bg-alt); color:var(--soft); font-family:'Space Grotesk'; font-size:13px; margin-bottom:10px; }
  .search-box::placeholder{ color:var(--soft-dim); }
  .list-group{ margin-bottom:14px; }
  .list-group-title{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 6px 2px; }
  .list-item{ background:var(--bg-alt); border-radius:9px; padding:10px 12px; margin-bottom:6px; border-left:3px solid var(--accent); }
  .list-item.is-hard{ border-left-color:var(--coral); }
  .li-en{ font-size:13px; font-weight:600; color:var(--soft); margin-bottom:2px; }
  .li-tr{ font-size:12.5px; color:var(--soft-dim); }
  .li-syn{ font-size:11.5px; color:var(--plum); font-style:italic; margin-top:3px; }
  ::selection{ background:var(--accent); color:#3a0a1d; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="eyebrow">YÖKDİL · Fen Bilimleri</div>
    <h1>Kelime Defteri</h1>
    <div class="sub" id="word-count">yükleniyor…</div>
  </header>

  <div class="stats">
    <span>Çalışılan: <b id="stat-seen">0</b>/<span id="stat-total">0</span></span>
    <span>Öğrenildi: <b id="stat-known">0</b></span>
    <span>Zor: <b id="stat-hard">0</b></span>
    <span>Bugün: <b id="stat-today">0</b></span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="tabs">
    <div class="tab active" data-mode="flashcard">Kartlar</div>
    <div class="tab" data-mode="quiz">Test</div>
    <div class="tab" data-mode="list">Liste</div>
  </div>

  <div class="chips" id="chips"></div>

  <!-- FLASHCARD -->
  <div id="flashcard-area">
    <div class="card-wrap" id="card-wrap">
      <div class="card" id="card">
        <div class="face face-front" id="face-front">
          <div class="tag-row"><span class="cat-tag" id="front-cat">—</span><div class="box-dot" id="front-dots"></div></div>
          <div class="word-en" id="front-text">Yükleniyor…</div>
          <div class="syn" id="front-syn"></div>
          <div class="hint">Anlamı için karta dokun</div>
        </div>
        <div class="face face-back" id="face-back">
          <div class="tag-row"><span class="cat-tag" id="back-cat">—</span><div class="box-dot" id="back-dots"></div></div>
          <div class="word-tr" id="back-text">Yükleniyor…</div>
          <div class="syn" id="back-syn"></div>
          <div class="ex" id="back-ex"></div>
          <div class="hint">Geri dönmek için tekrar dokun</div>
        </div>
      </div>
    </div>
    <div class="grade-row" id="grade-row">
      <button class="grade-btn grade-again" id="btn-again">↻ Tekrar Et</button>
      <button class="grade-btn grade-good" id="btn-good">✓ Biliyorum</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev">← Geri</button>
      <button class="nav-btn" id="btn-shuffle">⟳ Karıştır</button>
      <button class="nav-btn" id="btn-next">İleri →</button>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="love-toggle" checked>
      <label for="love-toggle">💗 Sevgiline özel motivasyon kartları</label>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-area" class="hidden">
    <div class="qmode-row">
      <button class="qmode-btn active" data-q="tr2en">Anlam→Kelime</button>
      <button class="qmode-btn" data-q="en2tr">Kelime→Anlam</button>
      <button class="qmode-btn" data-q="blank">Boşluk Doldur</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-q" id="quiz-question">Soru yükleniyor…</div>
      <div id="quiz-options"></div>
      <div class="scoreboard">
        <span>Doğru: <b class="ok" id="q-correct">0</b></span>
        <span>Yanlış: <b class="bad" id="q-wrong">0</b></span>
        <span>Seri: <b id="q-streak">0</b></span>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div id="list-area" class="hidden">
    <input class="search-box" id="search" placeholder="Kelime, anlam veya eş anlamlı ara…">
    <div id="list-results"></div>
  </div>

</div>

<script>
/* ============ VOCABULARY ============ */
const vocabulary = [
  /* NOUNS */

  /* ADJECTIVES */

/* ============ STORAGE ============ */
const STORE='yokdil_v2';
let daily={date:'',count:0};
function todayStr(){ return new Date().toISOString().slice(0,10); }
function loadProgress(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE)||'{}');
    if(d.words) vocabulary.forEach(w=>{ const s=d.words[w.eng]; if(s){ w.box=s.box||0; w.hard=!!s.hard; } });
    if(d.daily) daily=d.daily;
  }catch(e){}
  if(daily.date!==todayStr()) daily={date:todayStr(),count:0};
}
function saveProgress(){
  const words={};
  vocabulary.forEach(w=>{ if(w.box>0||w.hard) words[w.eng]={box:w.box,hard:w.hard}; });
  try{ localStorage.setItem(STORE, JSON.stringify({words, daily})); }catch(e){}
}
function bumpDaily(){ if(daily.date!==todayStr()) daily={date:todayStr(),count:0}; daily.count++; }

/* ============ STATE ============ */
let mode='flashcard', activeCat='Tümü', qType='tr2en';
let sequence=[], pos=0, qStreak=0;
loadProgress();
document.getElementById('word-count').textContent = vocabulary.length + ' akademik kelime · eş anlamlı + örnek cümle';
const categories = ['Tümü', ...new Set(vocabulary.map(w=>w.cat))];

/* ============ CHIPS ============ */
const chipsEl=document.getElementById('chips');
function buildChips(){
  chipsEl.innerHTML='';
  categories.forEach((c,idx)=>{
    const d=document.createElement('div');
    d.className='chip'+(activeCat===c?' active':''); d.textContent=c;
    d.onclick=()=>{ activeCat=c; buildChips(); applyFilter(); };
    chipsEl.appendChild(d);
    if(idx===0){
      const h=document.createElement('div');
      const cnt=vocabulary.filter(w=>w.hard).length;
      h.className='chip hard'+(activeCat==='__hard'?' active':'');
      h.textContent='⚠ Zor ('+cnt+')';
      h.onclick=()=>{ activeCat='__hard'; buildChips(); applyFilter(); };
      chipsEl.appendChild(h);
    }
  });
}
function currentPool(){
  if(activeCat==='Tümü') return vocabulary;
  if(activeCat==='__hard') return vocabulary.filter(w=>w.hard);
  return vocabulary.filter(w=>w.cat===activeCat);
}
function applyFilter(){ buildSequence(); pos=0; updateStats();
  if(mode==='flashcard') renderSeq();
  if(mode==='quiz') generateQuiz();
  if(mode==='list') renderList();
}

/* ============ TABS ============ */
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); mode=t.dataset.mode;
    document.getElementById('flashcard-area').classList.toggle('hidden', mode!=='flashcard');
    document.getElementById('quiz-area').classList.toggle('hidden', mode!=='quiz');
    document.getElementById('list-area').classList.toggle('hidden', mode!=='list');
    if(mode==='flashcard') renderSeq();
    if(mode==='quiz') generateQuiz();
    if(mode==='list') renderList();
  };
});

/* ============ SEQUENCE (words + love cards) ============ */
const loveEnabled=()=>document.getElementById('love-toggle').checked;
function buildSequence(){
  const ids=currentPool().map(w=>w.id);
  sequence=[];
  let li=0;
  ids.forEach((id,i)=>{
    sequence.push({kind:'word', id});
    if(loveEnabled() && (i+1)%6===0 && i!==ids.length-1){
      sequence.push({kind:'love', text:loveCards[li%loveCards.length]}); li++;
    }
  });
  if(sequence.length===0) sequence=[{kind:'empty'}];
}
document.getElementById('love-toggle').onchange=()=>{ buildSequence(); pos=0; renderSeq(); };

/* ============ FLASHCARDS ============ */
function dots(box){ let h=''; for(let i=0;i<3;i++) h+=`<span class="${i<box?'on':''}"></span>`; return h; }
function highlightEx(w){
  if(!w.ex) return '';
  const phrase=w.eng.split(' / ')[0];
  const re=new RegExp('('+phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','i');
  return w.ex.replace(re,'<b>$1</b>');
}
function renderSeq(){
  const card=document.getElementById('card'); card.classList.remove('flipped');
  const item=sequence[pos]||{kind:'empty'};
  const grade=document.getElementById('grade-row');
  if(item.kind==='love'){
    card.classList.add('is-love'); grade.style.display='none';
    document.getElementById('face-front').innerHTML='<div class="love-label">Sana özel 💗</div><div class="love-msg">'+item.text+'</div><div class="hint" style="color:rgba(255,255,255,.85)">çevirmek için dokun</div>';
    document.getElementById('face-back').innerHTML='<div class="love-heart">💗</div><div class="love-msg">Başaracaksın.</div><div class="hint" style="color:rgba(255,255,255,.85)">İleri ile devam et</div>';
    return;
  }
  card.classList.remove('is-love'); grade.style.display='';
  if(item.kind==='empty'){
    document.getElementById('face-front').innerHTML='<div class="word-en">Bu listede kelime yok.</div>'; return;
  }
  const w=vocabulary[item.id];
  document.getElementById('face-front').innerHTML=
    `<div class="tag-row"><span class="cat-tag">${w.cat}</span><div class="box-dot">${dots(w.box)}</div></div>
     <div class="word-en">${w.eng}</div><div class="syn">${w.syn?'≈ '+w.syn:''}</div>
     <div class="hint">Anlamı için karta dokun</div>`;
  document.getElementById('face-back').innerHTML=
    `<div class="tag-row"><span class="cat-tag">${w.cat}</span><div class="box-dot">${dots(w.box)}</div></div>
     <div class="word-tr">${w.tr}</div><div class="syn">${w.syn?'≈ '+w.syn:''}</div>
     <div class="ex">${highlightEx(w)}</div>
     <div class="hint">Geri dönmek için tekrar dokun</div>`;
  updateStats();
}
function currentWord(){ const it=sequence[pos]; return it&&it.kind==='word'?vocabulary[it.id]:null; }
document.getElementById('card-wrap').onclick=()=> document.getElementById('card').classList.toggle('flipped');
document.getElementById('btn-next').onclick=()=>{ pos=(pos+1)%sequence.length; renderSeq(); };
document.getElementById('btn-prev').onclick=()=>{ pos=(pos-1+sequence.length)%sequence.length; renderSeq(); };
document.getElementById('btn-shuffle').onclick=()=>{ const ids=currentPool().map(w=>w.id); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  sequence=[]; let li=0; ids.forEach((id,i)=>{ sequence.push({kind:'word',id}); if(loveEnabled()&&(i+1)%6===0&&i!==ids.length-1){sequence.push({kind:'love',text:loveCards[li%loveCards.length]});li++;} });
  pos=0; renderSeq(); };
document.getElementById('btn-again').onclick=()=>{ const w=currentWord(); if(!w)return; w.box=0; w.hard=true; bumpDaily(); saveProgress(); buildChips(); next(); };
document.getElementById('btn-good').onclick=()=>{ const w=currentWord(); if(!w)return; w.box=Math.min(3,w.box+1); if(w.box>=3) w.hard=false; bumpDaily(); saveProgress(); buildChips(); next(); };
function next(){ pos=(pos+1)%sequence.length; renderSeq(); }

document.addEventListener('keydown',e=>{ if(mode!=='flashcard')return;
  if(e.code==='Space'){e.preventDefault(); document.getElementById('card').classList.toggle('flipped');}
  if(e.code==='ArrowRight') document.getElementById('btn-next').click();
  if(e.code==='ArrowLeft') document.getElementById('btn-prev').click(); });

/* ============ STATS ============ */
function updateStats(){
  const pool=currentPool();
  document.getElementById('stat-total').textContent=pool.length;
  document.getElementById('stat-seen').textContent=pool.filter(w=>w.box>0).length;
  document.getElementById('stat-known').textContent=pool.filter(w=>w.box>=3).length;
  document.getElementById('stat-hard').textContent=vocabulary.filter(w=>w.hard).length;
  document.getElementById('stat-today').textContent=daily.count;
  const known=pool.filter(w=>w.box>=3).length;
  document.getElementById('progress-fill').style.width=pool.length?(known/pool.length*100)+'%':'0%';
}

/* ============ QUIZ ============ */
document.querySelectorAll('.qmode-btn').forEach(b=>{ b.onclick=()=>{ document.querySelectorAll('.qmode-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); qType=b.dataset.q; generateQuiz(); }; });
function blankInfo(w){ if(!w.ex)return null; const phrase=w.eng.split(' / ')[0]; const idx=w.ex.toLowerCase().indexOf(phrase.toLowerCase()); return idx>=0?phrase:null; }
function generateQuiz(){
  const pool=currentPool();
  const qq=document.getElementById('quiz-question'), oc=document.getElementById('quiz-options');
  if(pool.length<4){ qq.textContent='Bu kategoride yeterli kelime yok (en az 4 gerekli).'; oc.innerHTML=''; return; }
  if(qType==='blank'){
    const cand=pool.filter(w=>blankInfo(w)); 
    if(cand.length<4){ qq.textContent='Bu kategoride boşluk doldurma için yeterli örnek cümle yok.'; oc.innerHTML=''; return; }
    const q=cand[Math.floor(Math.random()*cand.length)]; const phrase=blankInfo(q);
    const re=new RegExp(phrase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    qq.innerHTML=q.ex.replace(re,'<span class="blank">______</span>');
    let opts=[q]; while(opts.length<4){ const r=pool[Math.floor(Math.random()*pool.length)]; if(!opts.includes(r))opts.push(r); }
    opts.sort(()=>Math.random()-.5); oc.innerHTML='';
    opts.forEach(o=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o.eng.split(' / ')[0]; b.onclick=()=>checkAns(o,q,b,'blank'); oc.appendChild(b); });
    return;
  }
  const q=pool[Math.floor(Math.random()*pool.length)]; const askTr=qType==='tr2en';
  qq.innerHTML=askTr?`<b>"${q.tr}"</b> anlamına gelen kelime hangisidir?`:`<b>"${q.eng}"</b> kelimesinin anlamı nedir?`;
  let opts=[q]; while(opts.length<4){ const r=pool[Math.floor(Math.random()*pool.length)]; if(!opts.includes(r))opts.push(r); }
  opts.sort(()=>Math.random()-.5); oc.innerHTML='';
  opts.forEach(o=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=askTr?o.eng:o.tr; b.onclick=()=>checkAns(o,q,b,askTr?'tr2en':'en2tr'); oc.appendChild(b); });
}
function checkAns(sel,correct,btn,t){
  document.querySelectorAll('.opt').forEach(b=>b.onclick=null);
  const txt = t==='tr2en'?correct.eng : t==='en2tr'?correct.tr : correct.eng.split(' / ')[0];
  if(sel===correct){ btn.classList.add('correct'); document.getElementById('q-correct').textContent=+document.getElementById('q-correct').textContent+1; qStreak++; if(correct.box<3){correct.box=Math.min(3,correct.box+1); if(correct.box>=3)correct.hard=false;} }
  else { btn.classList.add('wrong'); document.getElementById('q-wrong').textContent=+document.getElementById('q-wrong').textContent+1; qStreak=0; correct.hard=true;
    document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent===txt)b.classList.add('correct'); }); }
  document.getElementById('q-streak').textContent=qStreak; bumpDaily(); saveProgress(); buildChips(); updateStats();
  setTimeout(generateQuiz,1300);
}

/* ============ LIST ============ */
function renderList(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const pool=currentPool().filter(w=>!q||w.eng.toLowerCase().includes(q)||w.tr.toLowerCase().includes(q)||(w.syn&&w.syn.toLowerCase().includes(q)));
  const grouped={}; pool.forEach(w=>{(grouped[w.cat]=grouped[w.cat]||[]).push(w);});
  const root=document.getElementById('list-results'); root.innerHTML='';
  Object.keys(grouped).forEach(cat=>{ const g=document.createElement('div'); g.className='list-group';
    g.innerHTML=`<div class="list-group-title">${cat} · ${grouped[cat].length}</div>`;
    grouped[cat].forEach(w=>{ const it=document.createElement('div'); it.className='list-item'+(w.hard?' is-hard':'');
      it.innerHTML=`<div class="li-en">${w.eng}${w.hard?' ⚠':''}</div><div class="li-tr">${w.tr}</div>${w.syn?`<div class="li-syn">≈ ${w.syn}</div>`:''}`;
      g.appendChild(it); });
    root.appendChild(g); });
  if(pool.length===0) root.innerHTML='<div style="text-align:center;color:var(--soft-dim);font-size:13px;padding:30px 0;">Sonuç bulunamadı.</div>';
}
document.getElementById('search').addEventListener('input', renderList);

/* ============ INIT ============ */
buildChips(); buildSequence(); renderSeq(); updateStats();
</script>
</body>
</html>
