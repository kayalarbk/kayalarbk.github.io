<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barış Kaya | Portfolyo</title>

    <meta name="description" content="Barış Kaya'nın web ve gömülü sistemler projelerini bir araya getiren portfolyo sayfası.">
    <meta name="author" content="Barış Kaya">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="canonical" href="https://kayalarbk.github.io/">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Barış Kaya | Portfolyo">
    <meta property="og:description" content="Web & gömülü sistemler projeleri.">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text x='50' y='71' font-size='58' font-family='sans-serif' font-weight='700' fill='%23fff' text-anchor='middle'>B</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: rgba(25, 25, 25, 0.7);
            --bg-input: rgba(255, 255, 255, 0.04);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #6366f1;
            --accent-2: #a855f7;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        a { color: var(--accent); }

        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
            border-radius: 6px;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 10px;
            background: var(--accent);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            z-index: 10;
        }
        .skip-link:focus { left: 20px; }

        /* Header / Hero Section */
        header {
            text-align: center;
            padding: 100px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        header h1 {
            font-size: clamp(2.1rem, 7vw, 3rem);
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .socials a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: var(--bg-input);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color .25s ease, border-color .25s ease, transform .25s ease;
        }

        .socials a:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* Öne çıkan "Hakkımda" bandı */
        .about-banner {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 22px 26px;
            margin-bottom: 36px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(168, 85, 247, 0.06));
            text-decoration: none;
            color: inherit;
            transition: border-color .3s ease, transform .3s ease, box-shadow .3s ease;
        }

        .about-banner:hover,
        .about-banner:focus-visible {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 16px 34px var(--accent-glow);
        }

        .about-banner .avatar {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .about-banner strong { display: block; font-size: 1.05rem; }
        .about-banner span { color: var(--text-secondary); font-size: .9rem; }
        .about-banner .arrow { margin-left: auto; color: var(--accent); font-size: 1.3rem; }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .search-wrap { position: relative; flex: 1 1 260px; }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
            pointer-events: none;
        }

        #search {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color .25s ease, background .25s ease;
        }

        #search::placeholder { color: var(--text-secondary); }
        #search:focus { border-color: var(--accent); background: rgba(99, 102, 241, 0.06); }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .25s ease;
        }

        .filter-btn:hover { color: #fff; border-color: rgba(255, 255, 255, 0.25); }

        .filter-btn[aria-pressed="true"] {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent);
            color: #fff;
        }

        .filter-btn .n {
            opacity: .55;
            font-weight: 400;
            margin-left: 5px;
        }

        .result-count {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* Project Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            transition: transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        border-color .3s ease, box-shadow .3s ease, opacity .5s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover,
        .card:focus-within {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px var(--accent-glow);
        }

        .card:hover::before,
        .card:focus-within::before { opacity: 1; }

        .card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .card h3 a {
            color: #fff;
            text-decoration: none;
        }

        /* Başlık bağlantısını tüm kart yüzeyine yay (aksiyon linkleri üstte kalır) */
        .card h3 a::after {
            content: '';
            position: absolute;
            inset: 0;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 0.93rem;
            flex-grow: 1;
        }

        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 18px;
            align-self: flex-start;
        }

        /* Kart alt aksiyonları: site + repo */
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .card-actions a {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 13px;
            border: 1px solid var(--border-color);
            border-radius: 9px;
            background: var(--bg-input);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.79rem;
            font-weight: 600;
            transition: color .25s ease, border-color .25s ease, background .25s ease;
        }

        .card-actions a:hover {
            color: #fff;
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.12);
        }

        .card-actions svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .card[hidden] { display: none; }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding: 30px 20px 40px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Scroll reveal */
        .reveal { opacity: 0; transform: translateY(20px); }
        .reveal.visible { opacity: 1; transform: none; }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            *, *::before, *::after {
                transition-duration: .01ms !important;
                animation-duration: .01ms !important;
            }
            .reveal { opacity: 1; transform: none; }
        }

        @media (max-width: 600px) {
            header { padding: 60px 20px 30px; }
            .card { padding: 22px; }
            .project-grid { gap: 20px; }
            .about-banner { padding: 18px; gap: 14px; }
            .about-banner .arrow { display: none; }
        }
    </style>
</head>
<body>

    <a class="skip-link" href="#projects">İçeriğe geç</a>

    <header>
        <h1>Barış Kaya</h1>
        <p>Web &amp; Embedded Systems Developer Portfolio</p>
        <nav class="socials" aria-label="Sosyal bağlantılar">
            <a href="./hakkimda.html">Hakkımda</a>
            <a href="https://github.com/kayalarbk" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="mailto:kayalarbk2004@gmail.com">E-posta</a>
        </nav>
    </header>

    <main class="container" id="projects">

        <a class="about-banner" href="./hakkimda.html">
            <span class="avatar" aria-hidden="true">BK</span>
            <span>
                <strong>Hakkımda</strong>
                <span>Kim olduğum, yeteneklerim, deneyimlerim ve iletişim bilgilerim.</span>
            </span>
            <span class="arrow" aria-hidden="true">→</span>
        </a>

        <div class="controls">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
                </svg>
                <input type="search" id="search" placeholder="Proje ara..." aria-label="Projelerde ara" autocomplete="off">
            </div>
            <div class="filters" id="filters" role="group" aria-label="Kategori filtresi"></div>
        </div>

        <p class="result-count" id="count" role="status" aria-live="polite"></p>

        <div class="project-grid" id="grid"></div>

        <p class="empty-state" id="empty" hidden>Aramanla eşleşen proje bulunamadı.</p>

        <noscript>
            <p class="empty-state">
                Proje listesini görmek için JavaScript'i etkinleştir ya da
                <a href="https://github.com/kayalarbk?tab=repositories" target="_blank" rel="noopener noreferrer">GitHub profilime</a>
                göz at.
            </p>
        </noscript>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Barış Kaya · Tüm projeler GitHub Pages üzerinde yayınlanmaktadır.</p>
    </footer>

    <script>
    /* ============================================================
       PROJE LİSTESİ — düzenlemek için sadece burayı değiştir.

       Yeni proje eklemek:  listeye bir satır ekle.
       Proje kaldırmak:     o satırı sil (veya başına // koy).

       Alanlar:
         repo  → GitHub depo adı. Site ve repo linkleri bundan üretilir:
                   site: https://kayalarbk.github.io/<repo>/
                   repo: https://github.com/kayalarbk/<repo>
         ad    → kartta görünecek başlık
         acik  → kısa açıklama
         kat   → kategori. Sadece şu 4 değerden biri olmalı:
                   'Mühendislik' · 'Eğitim' · 'Araçlar' · 'Kişisel'
         site  → (isteğe bağlı) GitHub Pages dışında bir adres varsa yaz
         yok   → (isteğe bağlı) yayında site yoksa  yok: true  yaz,
                 kartta yalnızca GitHub bağlantısı gösterilir
       ============================================================ */
    const PROJELER = [
        { repo: 'MarmaraMPDS',     ad: 'MarmaraMPDS',     kat: 'Mühendislik', acik: 'Marmara Project Developer Society kulübü için resmi web sitesi ve üye koordinasyon yapısı.' },
        { repo: 'teknofest',       ad: 'teknofest',       kat: 'Mühendislik', acik: 'Teknofest yarışmaları için geliştirilen proje tanıtım ve detay sayfası.' },
        // Böyle bir depo GitHub'da bulunamadı; oluşturunca başındaki // işaretini kaldır:
        // { repo: 'Drone_project_c', ad: 'Drone_project_c', kat: 'Mühendislik', acik: 'Otonom drone ve robotik uçuş platformları için Ar-Ge dokümantasyonu.' },

        { repo: 'Ders-defteri',    ad: 'Ders-defteri',    kat: 'Eğitim',      acik: 'Mühendislik bölümü, devre analizi ve fizik gibi çekirdek dersler için not derlemeleri.' },
        { repo: 'DailyEnglish',    ad: 'DailyEnglish',    kat: 'Eğitim',      acik: 'Günlük İngilizce pratikleri ve kelime çalışmaları için web arayüzü.' },
        // GitHub Pages kapalı olduğu için yalnızca depo bağlantısı gösteriliyor:
        { repo: 'Myenglishday',    ad: 'Myenglishday',    kat: 'Eğitim',      acik: 'İngilizce öğrenim sürecini destekleyen interaktif platform.', yok: true },
        { repo: 'Ganohesaplama',   ad: 'Ganohesaplama',   kat: 'Eğitim',      acik: 'Öğrenciler için pratik ve hızlı akademik ortalama hesaplama aracı.' },

        { repo: 'cevirim',         ad: 'cevirim',         kat: 'Araçlar',     acik: 'Hızlı metin işlemleri ve dil çevirileri için geliştirilmiş uygulama sayfası.' },
        { repo: 'kolaj-yapici',    ad: 'kolaj-yapici',    kat: 'Araçlar',     acik: 'Görselleri birleştirip web üzerinden kolaj oluşturmaya yarayan araç.' },
        { repo: 'Creditfollow',    ad: 'Creditfollow',    kat: 'Araçlar',     acik: 'Kredi, bütçe ve finansal verileri takip etmek için oluşturulan gösterge paneli.' },

        { repo: 'AniKutumuz',      ad: 'AniKutumuz',      kat: 'Kişisel',     acik: 'Anıları saklamak ve sergilemek için geliştirilmiş dijital galeri projesi.' },
        { repo: 'Balkanturu',      ad: 'Balkanturu',      kat: 'Kişisel',     acik: 'Balkan seyahati rotaları, anıları ve gezi rehberi.' },
        { repo: 'duruilederin',    ad: 'duruilederin',    kat: 'Kişisel',     acik: 'Derin için hazırlanan özel arayüz tasarımı.' },
        { repo: 'Gift',            ad: 'Gift',            kat: 'Kişisel',     acik: 'Özel günler için tasarlanmış, sürpriz odaklı interaktif hediye sayfası.' },
    ];

    // Filtre çubuğundaki sıra
    const KATEGORILER = ['Mühendislik', 'Eğitim', 'Araçlar', 'Kişisel'];

    const KULLANICI = 'kayalarbk';

    /* ==================== buradan sonrası mekanizma ==================== */
    (function () {
        const grid = document.getElementById('grid');
        const search = document.getElementById('search');
        const filters = document.getElementById('filters');
        const count = document.getElementById('count');
        const empty = document.getElementById('empty');
        const TUMU = 'Tümü';

        document.getElementById('year').textContent = new Date().getFullYear();

        const siteUrl = p => p.site || 'https://' + KULLANICI + '.github.io/' + p.repo + '/';
        const repoUrl = p => 'https://github.com/' + KULLANICI + '/' + p.repo;

        const ICON_SITE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18"/></svg>';
        const ICON_REPO = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.5a10.5 10.5 0 0 0-3.32 20.47c.53.1.72-.23.72-.5v-1.8c-2.92.63-3.54-1.4-3.54-1.4-.48-1.22-1.17-1.55-1.17-1.55-.96-.65.07-.64.07-.64 1.06.08 1.62 1.09 1.62 1.09.94 1.61 2.47 1.15 3.07.88.1-.68.37-1.15.67-1.42-2.33-.27-4.78-1.17-4.78-5.19 0-1.15.41-2.08 1.09-2.82-.11-.27-.47-1.35.1-2.8 0 0 .88-.28 2.89 1.07a10 10 0 0 1 5.26 0c2-1.35 2.88-1.07 2.88-1.07.57 1.45.21 2.53.11 2.8.68.74 1.09 1.67 1.09 2.82 0 4.03-2.46 4.92-4.8 5.18.38.33.71.97.71 1.96v2.9c0 .28.19.61.73.5A10.5 10.5 0 0 0 12 1.5Z"/></svg>';

        // Kartları oluştur
        const cards = PROJELER.map(p => {
            const card = document.createElement('article');
            card.className = 'card reveal';
            card.dataset.kat = p.kat;

            const baslikLink = p.yok ? repoUrl(p) : siteUrl(p);
            const aksiyonlar = p.yok ? '' :
                '<a href="' + siteUrl(p) + '" target="_blank" rel="noopener noreferrer">' +
                ICON_SITE + 'Siteyi aç</a>';

            card.innerHTML =
                '<h3><a href="' + baslikLink + '" target="_blank" rel="noopener noreferrer">' + p.ad + '</a></h3>' +
                '<p>' + p.acik + '</p>' +
                '<span class="tag">' + p.kat + '</span>' +
                '<div class="card-actions">' + aksiyonlar +
                    '<a href="' + repoUrl(p) + '" target="_blank" rel="noopener noreferrer">' +
                    ICON_REPO + 'GitHub</a>' +
                '</div>';

            grid.appendChild(card);
            return card;
        });

        // Filtre butonları (parantez içinde proje sayısıyla)
        let aktif = TUMU;
        const sayi = kat => kat === TUMU
            ? PROJELER.length
            : PROJELER.filter(p => p.kat === kat).length;

        [TUMU, ...KATEGORILER].forEach(kat => {
            if (sayi(kat) === 0) return;           // boş kalan kategoriyi gösterme
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'filter-btn';
            btn.innerHTML = kat + '<span class="n">' + sayi(kat) + '</span>';
            btn.setAttribute('aria-pressed', String(kat === aktif));
            btn.addEventListener('click', () => {
                aktif = kat;
                filters.querySelectorAll('.filter-btn').forEach(b =>
                    b.setAttribute('aria-pressed', String(b === btn))
                );
                uygula();
            });
            filters.appendChild(btn);
        });

        // Türkçe karakterleri normalize ederek arama yap
        const norm = s => s.toLocaleLowerCase('tr').normalize('NFD').replace(/[̀-ͯ]/g, '');

        function uygula() {
            const q = norm(search.value.trim());
            let gorunen = 0;

            cards.forEach(card => {
                const katUyar = aktif === TUMU || card.dataset.kat === aktif;
                const metinUyar = !q || norm(card.textContent).includes(q);
                const goster = katUyar && metinUyar;
                card.hidden = !goster;
                if (goster) gorunen++;
            });

            count.textContent = gorunen + ' / ' + cards.length + ' proje gösteriliyor';
            empty.hidden = gorunen !== 0;
            grid.hidden = gorunen === 0;

            // Filtre sonrası yukarı kayan kartlar gözlemciyi tetiklemeyebilir;
            // ekranda olup henüz belirmemiş olanları elle göster.
            requestAnimationFrame(() => {
                cards.forEach(card => {
                    if (card.hidden || card.classList.contains('visible')) return;
                    if (card.getBoundingClientRect().top < window.innerHeight) {
                        card.classList.add('visible');
                    }
                });
            });
        }

        search.addEventListener('input', uygula);
        search.addEventListener('keydown', e => {
            if (e.key === 'Escape') { search.value = ''; uygula(); }
        });

        // "/" tuşu ile aramaya odaklan
        document.addEventListener('keydown', e => {
            if (e.key === '/' && document.activeElement !== search) {
                e.preventDefault();
                search.focus();
            }
        });

        uygula();

        // Kartların görünüme girerken belirmesi
        if ('IntersectionObserver' in window) {
            const io = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    entry.target.style.transitionDelay =
                        Math.min(cards.indexOf(entry.target), 6) * 60 + 'ms';
                    entry.target.classList.add('visible');
                    obs.unobserve(entry.target);
                });
            }, { rootMargin: '0px 0px -40px 0px' });
            cards.forEach(c => io.observe(c));
        } else {
            cards.forEach(c => c.classList.add('visible'));
        }
    })();
    </script>

</body>
</html>
