<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YÖKDİL Fen Kelime Çalışma Uygulaması</title>
    <style>
        :root {
            --primary: #d32f2f;
            --secondary: #2c3e50;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 24px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary);
        }

        button.active {
            background-color: var(--primary);
        }

        .container {
            width: 100%;
            max-width: 500px;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Flashcard Styles */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 250px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-front {
            background-color: var(--card-bg);
            border: 2px solid var(--secondary);
        }

        .card-back {
            background-color: var(--secondary);
            color: white;
            transform: rotateY(180deg);
        }

        .word-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .card-back .word-title {
            color: #ffeb3b;
        }

        .synonyms {
            font-size: 16px;
            color: #555;
            font-style: italic;
        }

        .card-back .synonyms {
            color: #e0e0e0;
        }

        /* Quiz Styles */
        .quiz-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #f0f0f0;
            color: #333;
            text-align: left;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .option-btn:hover {
            background-color: #e0e0e0;
        }

        .score-board {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>YÖKDİL Fen Kelime Ezber</h1>
        <p>Görsel notlarından hazırlanan interaktif çalışma seti</p>
    </header>

    <div class="nav-buttons">
        <button id="flashcard-mode-btn" class="active" onclick="switchMode('flashcard')">Kartlar (Flashcards)</button>
        <button id="quiz-mode-btn" onclick="switchMode('quiz')">Test Et (Quiz)</button>
    </div>

    <div class="container">
        <div id="flashcard-area" class="card-container" onclick="flipCard()">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="word-title" id="front-text">Loading...</div>
                    <div class="synonyms" id="front-sub">Eş anlamlılar için tıkla</div>
                </div>
                <div class="card-face card-back">
                    <div class="word-title" id="back-text">Loading...</div>
                    <div class="synonyms" id="back-sub"></div>
                </div>
            </div>
        </div>

        <div id="quiz-area" class="quiz-container hidden">
            <div class="question" id="quiz-question">Soru yükleniyor...</div>
            <div class="options" id="quiz-options"></div>
            <div class="score-board" id="score-board">Doğru: 0 | Yanlış: 0</div>
        </div>
    </div>

    <div class="controls" id="control-buttons">
        <button onclick="prevWord()">Geri</button>
        <button onclick="nextWord()">İleri / Rastgele</button>
    </div>

    <script>
        // Görsellerdeki kelimelerin birebir eşleşen veri seti
        const vocabulary = [
            { eng: "Conform to / Comply with / Adhere to / Abide by / Align with / Commit to", tr: "Uymak, Bağlı kalmak" },
            { eng: "Ubiquitous / Pervasive / Prevalent / Widespread", tr: "Yaygın, Her yerde bulunan" },
            { eng: "Reversible", tr: "Geri döndürülebilir" },
            { eng: "Irreversible", tr: "Geri döndürülemez" },
            { eng: "Fertile", tr: "Verimli (Toprak vb.)" },
            { eng: "Fruitless", tr: "Verimsiz, Sonuçsuz" },
            { eng: "Feasible / Viable / Executable", tr: "Gerçekleştirilebilir, Uygulanabilir" },
            { eng: "Draw on / Exploit / Harness / Employ / Utilize", tr: "Yararlanmak, Kullanmak, Sömürmek" },
            { eng: "Engage in / Participate in", tr: "Yer almak, Katılmak" },
            { eng: "Impetus / Stimulus / Incentive / Inducement / Driving force", tr: "Asıl güç, Dürtü, Güdü, Teşvik" },
            { eng: "Reminiscent / Evocative", tr: "Andıran, Hatırlatan" },
            { eng: "Responsive", tr: "Duyarlı, Tepki veren" },
            { eng: "Confidential", tr: "Gizli" },
            { eng: "Consent", tr: "Rıza, Onay" },
            { eng: "Call off / Abolish / Do away with / Cancel", tr: "Yürürlükten kaldırmak, İptal etmek" },
            { eng: "Receding / Withdraw / Retreat", tr: "Geri çekilme, Geri adım atmak" },
            { eng: "Seeking / Look for / Forage for", tr: "Aramak (Hayvanların yiyecek araması dahil)" },
            { eng: "Abandoning / Leave / Forsake / Relinquish", tr: "Bırakmak, Terk etmek" },
            { eng: "Ascertain / Define / Determined", tr: "Belirlemek, Tespit etmek" },
            { eng: "Demonstrated / Prove / Evidence", tr: "Göstermek, Kanıtlamak" },
            { eng: "Severely", tr: "Ciddi şekilde, Ağır biçimde (- olumsuz anlam)" },
            { eng: "Induced / Prompt / Stimulate / Trigger / Cause / Give rise to", tr: "Teşvik etmek, Yol açmak, Tetiklemek" },
            { eng: "Perpetuate / Maintain / Continue / Sustain / Prolong", tr: "Sürdürmek, Devam ettirmek" },
            { eng: "Overcome / Get over / Surmount", tr: "Üstesinden gelmek" },
            { eng: "Vanished / Fade / Disappear", tr: "Yok olmak, Gözden kaybolmak (≠ Exist)" },
            { eng: "Disseminated / Distribute / Scatter / Disperse / Spread / Transmit / Circulate", tr: "Yaymak, Dağıtmak" },
            { eng: "Resistance / Opposition / Defiance", tr: "Direnç, Karşı koyma" },
            { eng: "Vulnerability / Susceptible", tr: "Hassaslık, Savunmasızlık" },
            { eng: "Commitment / Devotion / Dedication / Obligation", tr: "Bağlılık, Sadakat, Zorunluluk" },
            { eng: "Indifference / Reluctance", tr: "İlgisizlik, Kayıtsızlık, Gönülsüzlük" },
            { eng: "Bring up", tr: "Gündeme getirmek veya Çocuk yetiştirmek" },
            { eng: "Requirement / Need / Necessity", tr: "Gereklilik, İhtiyaç" },
            { eng: "Drain / Depletion", tr: "Tüketme, Boşaltma" },
            { eng: "Propensity / Tendency / Predisposition", tr: "Eğilim, Meyil" },
            { eng: "Prosperity / Welfare / Flourish / Thrive", tr: "Refah, Gelişme, Zenginleşme" },
            { eng: "Prospect", tr: "Olasılık, Umut, Beklenti" },
            { eng: "Indispensable / Integral / Crucial", tr: "Ayrılmaz, Çok önemli, Vazgeçilmez" },
            { eng: "Obedience / Conformity / Compliance / Submission", tr: "Boyun eğme, İtaat" },
            { eng: "Inferiority", tr: "Daha düşük olma, Aşağılık (≠ Superior)" },
            { eng: "Under pressure", tr: "Baskı altında" },
            { eng: "Contend / Contend with / Deal with", tr: "İddia etmek; Mücadele etmek, Başa çıkmak" }
        ];

        let currentIndex = 0;
        let currentMode = 'flashcard';
        let score = { correct: 0, incorrect: 0 };

        function updateFlashcard() {
            const card = document.getElementById('card');
            card.classList.remove('flipped');
            setTimeout(() => {
                document.getElementById('front-text').innerText = vocabulary[currentIndex].eng;
                document.getElementById('back-text').innerText = vocabulary[currentIndex].tr;
            }, 150);
        }

        function flipCard() {
            if (currentMode === 'flashcard') {
                document.getElementById('card').classList.toggle('flipped');
            }
        }

        function nextWord() {
            if (currentMode === 'flashcard') {
                currentIndex = (currentIndex + 1) % vocabulary.length;
                updateFlashcard();
            } else {
                generateQuizQuestion();
            }
        }

        function prevWord() {
            if (currentMode === 'flashcard') {
                currentIndex = (currentIndex - 1 + vocabulary.length) % vocabulary.length;
                updateFlashcard();
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('flashcard-mode-btn').classList.toggle('active', mode === 'flashcard');
            document.getElementById('quiz-mode-btn').classList.toggle('active', mode === 'quiz');
            
            if (mode === 'flashcard') {
                document.getElementById('flashcard-area').classList.remove('hidden');
                document.getElementById('quiz-area').classList.add('hidden');
                document.getElementById('control-buttons').classList.remove('hidden');
                updateFlashcard();
            } else {
                document.getElementById('flashcard-area').classList.add('hidden');
                document.getElementById('quiz-area').classList.remove('hidden');
                document.getElementById('control-buttons').classList.add('hidden'); // Quiz has its own flow
                generateQuizQuestion();
            }
        }

        function generateQuizQuestion() {
            const correctIndex = Math.floor(Math.random() * vocabulary.length);
            const questionWord = vocabulary[correctIndex];
            
            document.getElementById('quiz-question').innerText = `"${questionWord.tr}" anlamına gelen kelime grubu hangisidir?`;
            
            let options = [questionWord.eng];
            while (options.length < 4) {
                const randIndex = Math.floor(Math.random() * vocabulary.length);
                const randWord = vocabulary[randIndex].eng;
                if (!options.includes(randWord)) {
                    options.push(randWord);
                }
            }
            
            // Seçenekleri karıştır
            options.sort(() => Math.random() - 0.5);
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, questionWord.eng, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, clickedBtn) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true); // Tıklamaları dondur
            
            if (selected === correct) {
                clickedBtn.style.backgroundColor = '#4caf50';
                clickedBtn.style.color = 'white';
                score.correct++;
            } else {
                clickedBtn.style.backgroundColor = '#f44336';
                clickedBtn.style.color = 'white';
                score.incorrect++;
                
                // Doğru olanı yeşil yap
                buttons.forEach(btn => {
                    if (btn.innerText === correct) {
                        btn.style.backgroundColor = '#4caf50';
                        btn.style.color = 'white';
                    }
                });
            }
            
            document.getElementById('score-board').innerText = `Doğru: ${score.correct} | Yanlış: ${score.incorrect}`;
            
            // 1.5 saniye sonra yeni soruya geç
            setTimeout(generateQuizQuestion, 1500);
        }

        // İlk açılış kurulumu
        updateFlashcard();
    </script>
</body>
</html>
